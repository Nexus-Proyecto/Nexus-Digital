<main class="container my-5">
  <h2 class="mb-4">Productos disponibles</h2>

  <!-- Filtros -->
  <div class="row mb-4">
    <div class="col-md-3">
      <label class="form-label">Precio mínimo</label>
      <input
        type="number"
        class="form-control"
        [(ngModel)]="precioMin"
        placeholder="$ Mínimo"/>
    </div>
    <div class="col-md-3">
      <label class="form-label">Precio máximo</label>
      <input
        type="number"
        class="form-control"
        [(ngModel)]="precioMax"
        placeholder="$ Máximo"/>
    </div>
    <div class="col-md-3">
      <label class="form-label">Ordenar por precio</label>
      <select class="form-control" [(ngModel)]="ordenPrecio">
        <option value="asc">Menor a mayor</option>
        <option value="desc">Mayor a menor</option>
      </select>
    </div>
    <div class="col-md-3 d-flex align-items-end">
      <button class="btn btn-primary w-100" (click)="aplicarFiltros()">
        Aplicar filtros
      </button>
    </div>
  </div>

  <!-- Lista de productos -->
  <div class="row">
    <div class="col-md-4 mb-4" *ngFor="let producto of productosFiltrados">
      <div class="card h-100">
        <div class="card-body">
          <h5 class="card-title">{{ producto.nombre }}</h5>
          <p class="card-text">{{ producto.descripcion }}</p>
          <p class="card-text">
            <strong>$ {{ producto.precio }}</strong>
          </p>
          <p class="card-text">
            <span *ngIf="producto.stock > 0">
              Stock disponible: {{ producto.stock }}
            </span>
            <span *ngIf="producto.stock === 0" class="text-danger">
              Agotado
            </span>
          </p>
        </div>
        <div class="card-footer">
          <button
            class="btn btn-primary w-100"
            (click)="verDetalle(producto.id_producto)">
            Ver detalle
          </button>
        </div>
      </div>
    </div>
  </div>

  <!-- Sin resultados -->
  <div *ngIf="productosFiltrados.length === 0" class="text-center mt-5">
    <p>No se encontraron productos con esos filtros.</p>
  </div>
</main>
