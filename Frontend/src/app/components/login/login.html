<div class="login-container container py-5">
  <div class="row justify-content-center">
    <div class="col-md-10 col-lg-8">

      <!-- Card Principal -->
      <div class="card shadow-lg border-0 login-card">

        <div class="card-header text-center py-4 border-0">
          <h2 class="login-title mb-1">Iniciar Sesión</h2>
          <p class="login-subtitle mb-0">Ingresa a tu cuenta de Nexus Digital</p>
        </div>

        <div class="card-body px-4 px-md-5 py-4">

          <!-- Alerta de Error -->
          <div *ngIf="errorMessage" class="alert alert-danger d-flex align-items-center mb-4 fade show" role="alert">
            <span class="material-icons me-2">error_outline</span>
            <div style="white-space: pre-line;">{{ errorMessage }}</div>
          </div>

          <form (ngSubmit)="onSubmit()" novalidate>

            <!-- Correo Electrónico -->
            <div class="mb-3">
              <label for="email" class="form-label">Correo Electrónico</label>
              <div class="input-group">
                <span class="input-group-text bg-white border-end-0">
                  <span class="material-icons text-muted">email</span>
                </span>
                <input type="email" id="email" name="email" [(ngModel)]="email" class="form-control border-start-0"
                  [class.is-invalid]="validationErrors['email']" placeholder="ejemplo@correo.com"
                  [disabled]="isLoading" />
                <div class="invalid-feedback" *ngIf="validationErrors['email']">
                  {{ validationErrors['email'] }}
                </div>
              </div>
            </div>

            <!-- Contraseña -->
            <div class="mb-4">
              <div class="d-flex justify-content-between align-items-center mb-1">
                <label for="password" class="form-label mb-0">Contraseña</label>
              </div>
              <div class="input-group">
                <span class="input-group-text bg-white border-end-0">
                  <span class="material-icons text-muted">lock</span>
                </span>
                <input type="password" id="password" name="password" [(ngModel)]="password"
                  class="form-control border-start-0" [class.is-invalid]="validationErrors['password']"
                  placeholder="Ingresa tu contraseña" [disabled]="isLoading" />
                <div class="invalid-feedback" *ngIf="validationErrors['password']">
                  {{ validationErrors['password'] }}
                </div>
              </div>
            </div>

            <!-- Botón de Ingreso -->
            <button type="submit"
              class="btn btn-primary w-100 py-2.5 login-btn d-flex align-items-center justify-content-center"
              [disabled]="isLoading">
              <span *ngIf="isLoading" class="spinner-border spinner-border-sm me-2" role="status"
                aria-hidden="true"></span>
              <span class="material-icons me-2" *ngIf="!isLoading">login</span>
              {{ isLoading ? 'Iniciando sesión...' : 'Ingresar' }}
            </button>

          </form>

          <!-- Pie del Formulario -->
          <div class="text-center mt-4">
            <p class="mb-0 text-muted">
              ¿No tienes una cuenta?
              <a routerLink="/registro" class="register-link fw-bold ms-1">Regístrate</a>
            </p>
          </div>

        </div>
      </div>

    </div>
  </div>
</div>
