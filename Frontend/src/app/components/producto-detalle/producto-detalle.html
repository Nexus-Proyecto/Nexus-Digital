<main class="container my-5">

  <button class="btn btn-secondary mb-4" (click)="volver()">
    ← Volver a productos
  </button>

  <div *ngIf="producto">
    <div class="card">
      <div class="card-header">
        <h2>{{ producto.nombre }}</h2>
      </div>

      <div class="card-body">
        <p class="card-text">{{ producto.descripcion }}</p>

        <p class="card-text">
          <strong>Precio: $ {{ producto.precio }}</strong>
        </p>

        <p class="card-text">
          <span *ngIf="producto.stock > 0">
            Stock disponible: {{ producto.stock }}
          </span>
          <span *ngIf="producto.stock === 0" class="text-danger">
            ⚠️ Producto agotado
          </span>
        </p>

        <div class="mt-3" *ngIf="producto.stock > 0">

          <!-- SELECTOR DE CANTIDAD -->
          <label for="cantidad"><strong>Cantidad:</strong></label>
          <input
            type="number"
            id="cantidad"
            [(ngModel)]="cantidad"
            min="1"
            [max]="producto.stock"
            class="form-control w-25 mt-1 mb-3"
          />

          <!-- BOTÓN QUE AGREGA Y REDIRIGE AL CARRITO -->
          <button class="btn btn-success" (click)="agregarAlCarrito()">
            🛒 Agregar al carrito
          </button>

        </div>
      </div>
    </div>
  </div>

  <div *ngIf="!producto" class="text-center mt-5">
    <p>Cargando producto...</p>
  </div>

</main>
