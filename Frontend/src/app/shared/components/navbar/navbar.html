<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
  <div class="container">
    <a class="navbar-brand d-flex align-items-center" routerLink="/">
      <img src="assets/logo.png" alt="Logo" class="me-2 logo-navbar" style="width: 115px; height: auto;">
    </a>

    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
      <span class="navbar-toggler-icon"></span>
    </button>

    <div class="collapse navbar-collapse" id="navbarNav">
      <ul class="navbar-nav ms-auto">
        <li class="nav-item">
          <a class="nav-link" routerLink="/" routerLinkActive="active" [routerLinkActiveOptions]="{ exact: true }">
            Inicio
          </a>
        </li>
        <li class="nav-item">
          <a class="nav-link" routerLink="/productos" routerLinkActive="active">
            Productos
          </a>
        </li>
        <li class="nav-item">
          <a class="nav-link" routerLink="/quienes-somos" routerLinkActive="active">
            Quiénes Somos
          </a>
        </li>

        @if (currentUser()) {
        <li class="nav-item">
          <a class="nav-link" routerLink="/dashboard" routerLinkActive="active">
            Panel de Control
          </a>
        </li>
        <li class="nav-item d-flex align-items-center ms-lg-2">
          <span class="navbar-text text-light me-3 mb-1 mb-lg-0">
            Hola, <strong>{{ currentUser().nombre }}</strong>
          </span>
        </li>
        <li class="nav-item d-flex align-items-center">
          <button class="btn btn-outline-light btn-sm" (click)="logout()">
            Cerrar Sesión
          </button>
        </li>
        } @else {
        <li class="nav-item">
          <a class="nav-link" routerLink="/login" routerLinkActive="active">
            Iniciar Sesión
          </a>
        </li>
        <li class="nav-item">
          <a class="nav-link" routerLink="/registro" routerLinkActive="active">
            Registro
          </a>
        </li>

      </ul>

      <div class="cart-summary-wrapper ms-3">
        <app-cart-summary></app-cart-summary>
      </div>

      <form class="d-flex ms-3" (ngSubmit)="onSearch()">
        <input class="form-control" type="search" placeholder="Buscar..." [(ngModel)]="searchQuery" name="search" />
        <button class="btn btn-primary ms-2" type="submit">
          Buscar
        </button>
      </form>
    </div>
  </div>
</nav>
